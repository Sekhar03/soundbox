version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: soundbox-db
    restart: always
    environment:
      POSTGRES_USER: soundbox_user
      POSTGRES_PASSWORD: soundbox_password
      POSTGRES_DB: soundbox_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: soundbox-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://soundbox_user:soundbox_password@db:5432/soundbox_db?schema=public
      JWT_SECRET: your_super_secret_jwt_token_123!
      PORT: 5000
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: soundbox-frontend
    restart: always
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true

volumes:
  postgres_data:
